services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile.prod
    container_name: ha-server
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-healthcare_agent}
      API_KEY: ${API_KEY}
      BASE_URL: ${BASE_URL:-https://generativelanguage.googleapis.com/v1beta/openai/}
      CHROMA_HOST: chroma
      CHROMA_PORT: 8000
    ports:
      - '8000:8000'
    depends_on:
      postgres:
        condition: service_healthy
      chroma:
        condition: service_started
    networks:
      - ha-network
    restart: unless-stopped

  client:
    build:
      context: ./client
      dockerfile: Dockerfile.prod
    container_name: ha-client
    depends_on:
      - server
    networks:
      - ha-network
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: ha-nginx
    ports:
      - '8080:80'
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - server
      - client
    networks:
      - ha-network
    restart: unless-stopped

networks:
  ha-network:
    name: ha-network-prod
