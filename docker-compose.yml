services:
  postgres:
    image: postgres:18
    container_name: ha-postgres
    shm_size: 128mb
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - ./postgres-data:/var/lib/postgresql/18/docker
      - ./db/data:/docker-entrypoint-initdb.d
    ports:
      - '5432:5432'
    networks:
      - ha-network

networks:
  ha-network:
    driver: bridge

volumes:
  postgres-data:
