services:
  postgres:
    image: postgres:18
    container_name: ha-postgres
    shm_size: 128mb
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-healthcare_agent}
    volumes:
      - postgres-data:/var/lib/postgresql/18/docker
      - ./db/data:/docker-entrypoint-initdb.d
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    networks:
      - ha-network
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-postgres}']
      interval: 5s
      timeout: 5s
      retries: 5

  chroma:
    image: chromadb/chroma:latest
    container_name: ha-chroma
    ports:
      - '8001:8000'
    volumes:
      - chroma-data:/chroma/chroma_db
    networks:
      - ha-network
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'curl -f http://localhost:8000/api/v1/heartbeat || exit 1',
        ]
      interval: 10s
      timeout: 5s
      retries: 3

networks:
  ha-network:
    driver: bridge

volumes:
  postgres-data:
  chroma-data:
